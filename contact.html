<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exotic Garden Gallery</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="site-header">
  
  <!-- LOGO -->
  <a href="index.html">
    <img src="img/logo.png" alt="Logo" class="logo-img">
  </a>

  <!-- MOBILE BUTTON -->
  <button class="menu-btn" onclick="openMenu()">☰</button>

  <!-- NAV LINKS -->
  <nav class="main-nav" id="mainNav">
    <button class="close-btn" onclick="closeMenu()">×</button>

    <a href="index.html">Home</a>
    <a href="classes.html">Classes & Events</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

</header>
   <section class="contact-section">
  <div class="contact-container">

    <!-- LEFT: FORM -->
    <div class="contact-form">
      <h2>Contact Us</h2>

      <form id="contact-form">
        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" required>

        <label>Message</label>
        <textarea name="message" rows="4" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>

    <!-- RIGHT: INFO -->
    <div class="contact-info">
      <h2>Get in Touch</h2>

      <p>
        📞 <a href="tel:+15025551234">(502) 555-1234</a>
      </p>

      <p>
        ✉️ <a href="mailto:info@garden.com">info@garden.com</a>
      </p>

      <p>
        📍 <a href="https://maps.google.com" target="_blank">
          123 Garden Street, Louisville, KY
        </a>
      </p>
    </div>

  </div>
</section>

<footer class="site-footer">
    <img src="img/logo.png" alt="Exotic Garden Gallery logo" class="footer-logo" />
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="classes.html">Classes & Events</a>
      <a href="shop.html">Shop</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </footer>

  <script src="nav.js"></script>
</body>
</html>
