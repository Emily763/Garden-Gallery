<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <title>Exotic Garden Gallery</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="logo-link" aria-label="Exotic Garden Gallery Home">
        <img src="img/logo.png" alt="Exotic Garden Gallery logo" class="logo-img" />
        </a>

        <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>

        <nav class="main-nav" id="mainNav">
        <button class="close-btn" id="closeBtn" aria-label="Close menu">×</button>
        <a href="index.html">Home</a>
        <a href="classes.html">Classes & Events</a>
        <a href="#">Shop</a>
        <a href="#">Blog</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
        </nav>
  </header>
   <section class="contact-section">
  <div class="contact-container">

    <!-- LEFT: FORM -->
    <div class="contact-form">
      <h2>Contact Us</h2>

      <form id="contact-form">
        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" required>

        <label>Message</label>
        <textarea name="message" rows="4" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>

    <!-- RIGHT: INFO -->
    <div class="contact-info">
      <h2>Get in Touch</h2>

      <p>
        📞 <a href="tel:+15025551234">(502) 555-6872</a>
      </p>

      <p>
        ✉️ <a href="mailto:gardengallery@gmail.com">gardengallery@gmail.com</a>
      </p>

      <p>
        📍 <a href="https://maps.google.com" target="_blank">
          1429 East Willow St, Louisville, KY, 40243
        </a>
      </p>
    </div>

  </div>
</section>

<footer class="site-footer">
    <img src="img/logo.png" alt="Exotic Garden Gallery logo" class="footer-logo" />
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="classes.html">Classes & Events</a>
      <a href="#">Shop</a>
      <a href="#">Blog</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact Us</a>
    </nav>
    <p>© <span id="year"></span> Exotic Garden Gallery</p>
  </footer>

  <script src="nav.js"></script>
</body>
</html>
